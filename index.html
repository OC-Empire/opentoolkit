<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 OpenToolkit - 500 Open Source Tools</title>
    <script src="https://unpkg.com/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(90deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { font-size: 1.2rem; color: #8b949e; }
        .stats {
            display: inline-flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(88, 166, 255, 0.3);
        }
        .search-box {
            width: 100%;
            padding: 15px 25px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 2px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            outline: none;
            margin-bottom: 30px;
        }
        .search-box:focus { border-color: #58a6ff; }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .tool-card {
            padding: 20px;
            background: rgba(22, 27, 34, 0.8);
            border-radius: 12px;
            border: 1px solid #30363d;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: #58a6ff;
        }
        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        .tool-name {
            margin: 0;
            color: #58a6ff;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .tool-score {
            padding: 4px 10px;
            background: rgba(88, 166, 255, 0.2);
            border-radius: 20px;
            font-size: 0.85rem;
            color: #58a6ff;
        }
        .tool-desc {
            margin: 0 0 15px 0;
            color: #8b949e;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .tool-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tool-category {
            padding: 4px 12px;
            background: rgba(163, 113, 247, 0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #a371f7;
        }
        .tool-link {
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .tool-link:hover { text-decoration: underline; }
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 40px;
            color: #8b949e;
        }
        .footer a { color: #58a6ff; text-decoration: none; }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #8b949e;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .tools-grid { grid-template-columns: 1fr; }
            .stats { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 OpenToolkit</h1>
            <p>500 Open Source Tools for Developers, Privacy & Automation</p>
            <div class="stats">
                <div><strong id="total-tools">500</strong> Tools</div>
                <div><strong>10</strong> Categories</div>
                <div><strong>88.8</strong> Avg Score</div>
            </div>
        </div>

        <input type="text" class="search-box" id="search" placeholder="Search 500+ tools...">

        <div id="tools-container" class="tools-grid">
            <div class="loading">Loading 500 tools... 🚀</div>
        </div>

        <div class="footer">
            <p>🚀 Built with full automation • 500 tools • Open Source</p>
            <p><a href="https://github.com/OC-Empire/opentoolkit">GitHub</a></p>
        </div>
    </div>

    <script>
        let allTools = [];
        let fuse = null;

        async function loadTools() {
            try {
                const response = await fetch('data/tools.json');
                const data = await response.json();
                allTools = data.tools;
                
                fuse = new Fuse(allTools, {
                    keys: ['name', 'description', 'category', 'categories'],
                    threshold: 0.3
                });
                
                renderTools(allTools.slice(0, 50));
            } catch (error) {
                document.getElementById('tools-container').innerHTML = 
                    '<div class="loading">Error loading tools. Please refresh.</div>';
            }
        }

        function renderTools(tools) {
            const container = document.getElementById('tools-container');
            if (tools.length === 0) {
                container.innerHTML = '<div class="loading">No tools found.</div>';
                return;
            }
            
            container.innerHTML = tools.map(tool => `
                <div class="tool-card">
                    <div class="tool-header">
                        <h3 class="tool-name">${tool.name}</h3>
                        <span class="tool-score">${tool.score}/100</span>
                    </div>
                    <p class="tool-desc">${tool.description}</p>
                    <div class="tool-footer">
                        <span class="tool-category">${tool.category}</span>
                        <a href="${tool.sourceUrl}" target="_blank" rel="noopener" class="tool-link">View →</a>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value;
            if (!query) {
                renderTools(allTools.slice(0, 50));
                return;
            }
            const results = fuse.search(query).map(r => r.item);
            renderTools(results.slice(0, 50));
        });

        loadTools();
    </script>
</body>
</html>
